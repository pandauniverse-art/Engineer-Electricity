<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전기 마스터 스마트 학습 플랫폼</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --bg-main: #f5f7fa;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --primary: #4f46e5;
            --primary-light: #e0e7ff;
            --border: #e2e8f0;
            
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.06);
            --radius-md: 16px;
            --radius-lg: 24px;
            --transition: all 0.25s ease;
        }

        body.dark-mode {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --primary: #6366f1;
            --primary-light: #312e81;
            --border: #334155;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); line-height: 1.6; transition: var(--transition); }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* 헤더 */
        .header { background: var(--bg-card); padding: 15px 0; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.4rem; color: var(--text-main); }
        .logo-icon { width: 36px; height: 36px; background: var(--primary); color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        .main-container { padding: 30px 0 80px; }

        /* 제어 패널 디자인 */
        .control-panel { 
            background: var(--bg-card); 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: var(--shadow-sm); 
            margin-bottom: 25px; 
            border: 1px solid var(--border); 
            display: flex; 
            gap: 20px; 
            justify-content: center;
            flex-wrap: wrap;
        }
        .select-group { display: flex; flex-direction: column; gap: 8px; }
        .select-group label { font-weight: bold; font-size: 0.9rem; }
        .select-group select { 
            padding: 10px 15px; 
            border-radius: 6px; 
            border: 1px solid var(--border); 
            font-size: 1rem; 
            min-width: 200px;
            background-color: var(--bg-card);
            color: var(--text-main);
        }

        /* 2단 대시보드 레이아웃 배정 */
        .main-layout { 
            display: grid; 
            grid-template-columns: 320px 1fr; 
            gap: 25px; 
        }
        @media (max-width: 768px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        /* 사이드바 배치 */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .widget-card { 
            background: var(--bg-card); 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        .widget-card h5 { margin-top: 0; margin-bottom: 15px; font-size: 1.1rem; border-bottom: 2px solid var(--primary); padding-bottom: 6px; color: var(--primary); }

        /* 과목 카테고리 필터 스위치 버튼 */
        .category-container { display: flex; flex-direction: column; gap: 10px; }
        .category-btn { 
            padding: 12px 15px; 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            text-align: left; 
            font-size: 0.95rem; 
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer; 
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .category-btn:hover { background: var(--border); transform: translateX(4px); }

        /* 🚨 [핵심 수정] 우측 메인 영역을 가로 2열 바둑판 구조로 무조건 쪼갬 */
        .content-area { 
            display: grid !important; 
            grid-template-columns: repeat(2, 1fr) !important; 
            gap: 20px !important; 
            align-content: start;
        }
        @media (max-width: 992px) {
            .content-area { grid-template-columns: 1fr !important; }
        }

        /* 오른쪽 메인 핵심 개념 카드 구성 스펙 */
        .concept-card { 
            background: var(--bg-card); 
            padding: 22px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: max-content;
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .concept-title { font-size: 1.25rem; font-weight: 700; color: var(--text-main); }
        .freq-badge { font-size: 0.8rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; color: white; }
        .freq-상 { background: #ef4444; }
        .freq-중 { background: #f59e0b; }
        .freq-하 { background: #10b981; }
        .concept-def { font-size: 1rem; color: var(--text-sub); line-height: 1.5; }

        /* 카테고리와 공식 사이에 표기될 핵심 리스트 디자인 규격 */
        .concept-bullets {
            padding-left: 18px;
            margin: 4px 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .concept-bullets li {
            font-size: 0.88rem;
            color: var(--text-main);
            list-style-type: square;
            word-break: keep-all;
        }

        /* 수식 박스 공간 최적화 및 가로폭 콤팩트 중앙 정렬 */
        .formula-box { 
            background: var(--primary-light) !important; 
            color: var(--primary) !important; 
            padding: 12px 20px !important;    
            border-radius: var(--radius-md); 
            font-size: 1.05rem !important; 
            width: 100% !important;   
            max-width: 100% !important;      
            margin: 10px auto !important;    
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            overflow-x: auto;
        }

        /* MathJax 자체 가로/세로 엔진 마진 제로 리셋 */
        .formula-box mjx-container,
        #conceptList mjx-container,
        .concept-card mjx-container {
            margin: 0 !important;
            padding: 0 !important;
            display: inline-block !important;
        }

        /* CBT 모의고사 실전 모드 스펙 스타일 */
        .mock-paper-box {
            background: var(--bg-card);
            padding: 35px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
            grid-column: span 2; /* 그리드에서 모의고사는 가로 전체 차지 */
        }
        .mock-opt-btn {
            width: 100%;
            display: flex;
            align-items: center;
            text-align: left;
            padding: 15px 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-card);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .mock-opt-btn:hover {
            background: var(--primary-light);
            border-color: var(--primary);
        }

        .details-list { padding-left: 20px; margin: 8px 0; font-size: 0.9rem; line-height: 1.6; color: var(--text-sub); }
        .details-list li { margin-bottom: 6px; }
        .no-data { grid-column: span 2; text-align: center; color: var(--text-sub); padding: 40px; font-weight: 500; font-style: italic; }
    </style>
</head>
<body>

<div class="header">
    <div class="container header-content">
        <div class="logo">
            <div class="logo-icon">⚡</div>
            <span>전기 마스터 스마트 학습 플랫폼</span>
        </div>
    </div>
</div>

<div class="container main-container">
    <div class="control-panel">
        <div class="select-group">
            <label for="levelSelect">목표 자격증 선택</label>
            <select id="levelSelect">
                <option value="craftsman">전기기능사</option>
                <option value="industrial_engineer">전기산업기사</option>
                <option value="engineer" selected>전기기사</option>
            </select>
        </div>
        <div class="select-group">
            <label for="modeSelect">학습 검토 모드</label>
            <select id="modeSelect">
                <option value="written">필기 모드 (Written)</option>
                <option value="practical">실기 모드 (Practical)</option>
                <option value="mockexam">⚡ 실전 모의고사</option>
            </select>
        </div>
    </div>

    <div class="main-layout" id="mainLayoutStructure">
        
        <div class="sidebar" id="sidebarSection">
            <div class="widget-card" id="subjectSection">
                <h5>📚 소속 과목 카테고리</h5>
                <div class="category-container" id="categoryList"></div>
            </div>

            <div class="widget-card" id="qualificationInfo"></div>
            <div class="widget-card" id="mockExamInfo"></div>
        </div>

        <div class="content-area" id="conceptList"></div>
        <div class="content-area" id="mockExamContainer" style="display: none;"></div>

    </div>
</div>

<script>
// ==========================================================================
// 마스터 데이터베이스 객체 선언 (원본 데이터 100% 유지)

  concepts: [
    // ===== 0. 기초전기·수학 (20개) =====
    { id: 101, category: 'foundation', levels: ['craftsman'], title: '옴의 법칙 (Ohm\'s Law)', definition: '전류는 전압에 비례하고 저항에 반비례한다.', formula: '$$ I = \\frac{V}{R} $$\\n$$ V = I \\times R $$\\n$$ R = \\frac{V}{I} $$', frequency: '상' },

    { id: 106, category: 'foundation', levels: ['craftsman'], title: '각주파수 (ω)', definition: '1초당 회전 각도(라디안).', formula: '$$ \\omega = 2\\pi f \\text{ [rad/s]} $$', frequency: '중' },

    { id: 108, category: 'foundation', levels: ['craftsman'], title: '줄의 법칙 (Joule\'s Law)', definition: '전류가 흐를 때 발생하는 열량.', formula: '$$ H = 0.24 I^2 R t \\text{ [cal]} $$', frequency: '중' },

    { id: 110, category: 'foundation', levels: ['craftsman'], title: '실효값과 평균값', definition: '교류의 크기 기준. 정현파 기준식.', formula: '$$ V_{rms} = \\frac{V_m}{\\sqrt{2}} $$\\n$$ V_{avg} = \\frac{2V_m}{\\pi} $$', frequency: '상' },
    { id: 111, category: 'foundation', levels: ['craftsman'], title: '파고율과 파형율', definition: '파형의 날카로움과 평활도.', formula: '$$ \\text{파고율} = \\frac{\\text{최대값}}{\\text{실효값}} $$\\n$$ \\text{파형율} = \\frac{\\text{실효값}}{\\text{평균값}} $$', frequency: '중' },
    { id: 112, category: 'foundation', levels: ['craftsman'], title: '컨덕턴스와 어드미턴스', definition: '저항과 임피던스의 역수.', formula: '$$ G = \\frac{1}{R} \\text{ [S]} $$\\n$$ Y = \\frac{1}{Z} = G + jB $$', frequency: '중' },
    { id: 113, category: 'foundation', levels: ['craftsman'], title: '호도법 (Radian)', definition: '각도를 π로 변환.', formula: '$$ 1 \\text{ rad} = \\frac{180}{\\pi}^\\circ $$', frequency: '하' },

    { id: 119, category: 'foundation', levels: ['craftsman'], title: '전하량 (Q)', definition: '전류와 시간의 곱.', formula: '$$ Q = I \\times t \\text{ [C]} $$', frequency: '상' },
    { id: 120, category: 'foundation', levels: ['craftsman'], title: '전압 분배 법칙', definition: '직렬 회로에서 전압이 저항에 비례하여 분배.', formula: '$$ V_1 = V \\frac{R_1}{R_1 + R_2} $$', frequency: '상' },

    { id: 202, category: 'electromagnetics', levels: ['industrial_engineer', 'engineer'], title: '전계의 세기 (E)', definition: '단위 전하가 받는 힘.', formula: '$$ E = \\frac{F}{Q} = \\frac{V}{d} \\text{ [V/m]} $$', frequency: '상' },

const mockExamSettings = {
  craftsman: { name: "전기기능사 필기 모의고사", timeLimit: 60 * 60, totalQuestions: 60, passingScore: 60, subjects: ['foundation', 'machine', 'regulation'] },

  engineer: { name: "전기기사 필기 모의고사", timeLimit: 150 * 60, totalQuestions: 100, passingScore: 60, subjects: ['electromagnetics', 'power', 'machine', 'circuit', 'control', 'regulation'] }

// ==========================================================================
// 비즈니스 로직 및 동적 UI 바인딩 코어 엔진
// ==========================================================================

let selectedLevel = 'engineer';
let selectedCategory = 'all';
let currentMode = 'written'; 

let mockTimerInterval = null;
let mockTimeLeft = 0;
let mockQuestions = [];
let currentMockIdx = 0;
let mockScore = 0;

document.addEventListener('DOMContentLoaded', () => {
    initApp();
});

function initApp() {
    const levelSelect = document.getElementById("levelSelect");
    const modeSelect = document.getElementById("modeSelect");

    if (levelSelect) selectedLevel = levelSelect.value;
    if (modeSelect) currentMode = modeSelect.value;

    if (levelSelect) {
        levelSelect.addEventListener("change", (e) => {
            selectedLevel = e.target.value;
            renderSidebarRequirements();
            if (currentMode === 'mockexam') {
                initMockExamCore(selectedLevel);
            } else {
                selectedCategory = 'all';
                renderTabs();
                renderConcepts();
            }
        });
    }

    if (modeSelect) {
        modeSelect.addEventListener("change", (e) => {
            currentMode = e.target.value;
            clearInterval(mockTimerInterval); 

            const cGrid = document.getElementById("conceptList");
            const mockContainer = document.getElementById("mockExamContainer");
            const sidebarSection = document.getElementById("sidebarSection");
            const mainLayoutStructure = document.getElementById("mainLayoutStructure");

            if (currentMode === 'mockexam') {
                if (sidebarSection) sidebarSection.style.display = 'none';
                if (mainLayoutStructure) mainLayoutStructure.style.gridTemplateColumns = '1fr';
                if (cGrid) {
                    cGrid.style.display = 'none';
                    cGrid.style.setProperty('display', 'none', 'important');
                }
                if (mockContainer) {
                    mockContainer.style.display = 'block';
                    initMockExamCore(selectedLevel);
                }
            } else {
                if (mockContainer) mockContainer.style.display = 'none';
                if (cGrid) {
                    cGrid.style.display = 'grid';
                    cGrid.style.setProperty('display', 'grid', 'important');
                }
                if (sidebarSection) sidebarSection.style.display = 'flex';
                if (mainLayoutStructure) {
                    mainLayoutStructure.style.gridTemplateColumns = window.innerWidth <= 768 ? '1fr' : '320px 1fr';
                }
                
                selectedCategory = 'all';
                renderTabs();
                renderConcepts();
            }
        });
    }

    renderSidebarRequirements();
    renderTabs();
    renderConcepts();
}

function renderSidebarRequirements() {
    const requirementContainer = document.getElementById("qualificationInfo");
    if (!requirementContainer) return;

    const currentReq = qualificationRequirements.find(req => {
        if (selectedLevel === "craftsman") return req.grade === "전기기능사";
        if (selectedLevel === "industrial_engineer") return req.grade === "전기산업기사";
        return req.grade === "전기기사";
    });

    if (currentReq) {
        let detailsHtml = currentReq.details.map(d => `<li>${d}</li>`).join("");
        requirementContainer.innerHTML = `
            <h5>${currentReq.icon} ${currentReq.grade} 요건</h5>
            <p style="font-size:0.9rem; margin: 0 0 10px 0;"><strong>요약:</strong> ${currentReq.summary}</p>
            <ul class="details-list">${detailsHtml}</ul>
        `;
    }
}

function renderTabs() {
    const categoryContainer = document.getElementById("categoryList");
    const mockSettingsContainer = document.getElementById("mockExamInfo");
    if (!categoryContainer) return;

    categoryContainer.innerHTML = "";
    const filteredCategories = electricianData.categories.filter(cat => 
        cat.mode === currentMode && cat.levels.includes(selectedLevel)
    );
    
    if (filteredCategories.length === 0) {
        categoryContainer.innerHTML = "<p class='no-data'>활성화된 과목 카테고리가 없습니다.</p>";
    } else {
        categoryContainer.innerHTML += `
            <button class="category-btn" style="border-left: 5px solid #64748b;" onclick="filterBySpecificCategory('all')">
                <span>📚</span> 전체 보기
            </button>
        `;
        filteredCategories.forEach(cat => {
            categoryContainer.innerHTML += `
                <button class="category-btn" style="border-left: 5px solid ${cat.color};" onclick="filterBySpecificCategory('${cat.id}')">
                    <span>${cat.icon}</span> ${cat.name}
                </button>
            `;
        });
    }

    if (mockSettingsContainer) {
        const settings = mockExamSettings[selectedLevel];
        if (settings) {
            mockSettingsContainer.innerHTML = `
                <h5>📋 모의고사 스펙</h5>
                <ul class="details-list" style="padding-left:15px; margin:0;">
                    <li><strong>시험 시간:</strong> ${settings.timeLimit / 60}분</li>
                    <li><strong>문항 수:</strong> ${settings.totalQuestions}문항</li>
                    <li><strong>합격 기준:</strong> ${settings.passingScore}점 이상</li>
                </ul>
            `;
        }
    }
}

function renderConcepts() {
    const conceptContainer = document.getElementById("conceptList");
    if (!conceptContainer) return;

    conceptContainer.innerHTML = "";
    const filteredConcepts = electricianData.concepts.filter(con => {
        const isLevelMatch = con.levels.includes(selectedLevel);
        const categoryObj = electricianData.categories.find(c => c.id === con.category);
        const isModeMatch = categoryObj && categoryObj.mode === currentMode;
        const isCategoryMatch = selectedCategory === 'all' || con.category === selectedCategory;
        return isLevelMatch && isModeMatch && isCategoryMatch;
    });

    if (filteredConcepts.length === 0) {
        conceptContainer.innerHTML = "<p class='no-data'>조건에 맞는 마스터 개념 데이터가 존재하지 않습니다.</p>";
        return;
    }

    filteredConcepts.forEach(con => {
        const summaryBullets = [
            "국가기술검정 필기/실기 시험 단골 출제 키워드 스코프",
            "공학용 계산기 수식 인자값 대입 및 단위 환산 절대 주의",
            "주관식 단답형 정답 마킹을 위한 필수 암기 핵심 마일스톤"
        ];

        conceptContainer.innerHTML += `
            <div class="concept-card" id="concept-${con.id}">
                <div class="card-header">
                    <span class="freq-badge freq-${con.frequency}">빈도: ${con.frequency}</span>
                    <h4 class="concept-title">${con.title}</h4>
                </div>
                <p class="concept-def">${con.definition}</p>
                
                <ul class="concept-bullets">
                    ${summaryBullets.map(bullet => `<li>${bullet}</li>`).join('')}
                </ul>
                
                ${con.formula ? `<div class="formula-box">${con.formula.replace(/\\n/g, '<br/>')}</div>` : ''}
            </div>
        `;
    });
    
    if (window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise();
    }
}

function filterBySpecificCategory(categoryId) {
    selectedCategory = categoryId;
    renderConcepts();
}

function initMockExamCore(gradeKey) {
    const config = mockExamSettings[gradeKey];
    if (!config) return;

    const matchPool = electricianData.concepts.filter(c => config.subjects.includes(c.category));
    const finalCount = Math.min(config.totalQuestions, matchPool.length, 20);

    mockQuestions = matchPool.sort(() => 0.5 - Math.random()).slice(0, finalCount);
    currentMockIdx = 0;
    mockScore = 0;
    mockTimeLeft = config.timeLimit;

    mockTimerInterval = setInterval(() => {
        mockTimeLeft--;
        if (mockTimeLeft <= 0) {
            clearInterval(mockTimerInterval);
            alert('시험 제한시간이 만료되었습니다. 즉시 답안지를 회수합니다.');
            renderMockResultScreen();
        }
        updateMockTimerUI();
    }, 1000);

    renderMockQuestionScreen();
}

function updateMockTimerUI() {
    const el = document.getElementById('mockClock');
    if (!el) return;
    const min = Math.floor(mockTimeLeft / 60);
    const sec = mockTimeLeft % 60;
    el.innerText = `⏳ 남은 시간: ${min}분 ${sec}초`;
}

function renderMockQuestionScreen() {
    const container = document.getElementById('mockExamContainer');
    const q = mockQuestions[currentMockIdx];
    if (!container || !q) return;

    const pool = electricianData.concepts.filter(c => c.id !== q.id);
    const wrongAnswers = pool.sort(() => 0.5 - Math.random()).slice(0, 3).map(c => c.title);
    const shuffledOptions = [...wrongAnswers, q.title].sort(() => 0.5 - Math.random());
    const numberIcons = ['①', '②', '③', '④'];

    const min = Math.floor(mockTimeLeft / 60);
    const sec = mockTimeLeft % 60;

    container.innerHTML = `
        <div class="mock-paper-box">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #e2e8f0; padding-bottom:15px; margin-bottom:20px;">
                <span style="font-weight:bold; color:var(--primary); font-size:1.2rem;"><i class="fas fa-edit"></i> CBT 국가기술자격 실전 모의고사 수험실</span>
                <span id="mockClock" style="font-weight:bold; color:#e53e3e; background:#fff5f5; padding:6px 12px; border-radius:6px;">⏳ 남은 시간: ${min}분 ${sec}초</span>
            </div>
            
            <div style="color:var(--text-sub); font-weight:bold; margin-bottom:8px; font-size:0.9rem;">문항 번호: ${currentMockIdx + 1} / ${mockQuestions.length}</div>
            <div style="font-size:1.3rem; font-weight:bold; line-height:1.6; color:var(--text-main); margin-bottom:30px; word-break:keep-all;">
                ${q.definition}
            </div>
            
            <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:20px;">
                ${shuffledOptions.map((opt, index) => `
                    <button class="mock-opt-btn" data-answer="${opt}">
                        <span style="font-weight:bold; color:var(--primary); margin-right:12px; font-size:1.1rem;">${numberIcons[index]}</span>
                        <span style="font-weight:500; color:var(--text-main);">${opt}</span>
                    </button>
                `).join('')}
            </div>
        </div>
    `;

    container.querySelectorAll('.mock-opt-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const userChoice = btn.getAttribute('data-answer');
            if (userChoice === q.title) mockScore++;

            currentMockIdx++;
            if (currentMockIdx < mockQuestions.length) {
                renderMockQuestionScreen();
            } else {
                clearInterval(mockTimerInterval);
                renderMockResultScreen();
            }
        });
    });
}

function renderMockResultScreen() {
    const container = document.getElementById('mockExamContainer');
    const scorePct = Math.round((mockScore / mockQuestions.length) * 100);
    const isPass = scorePct >= 60;

    container.innerHTML = `
        <div class="mock-paper-box" style="text-align:center; padding:50px 20px;">
            <div style="font-size:4.5rem; margin-bottom:15px;">${isPass ? '🎉' : '😰'}</div>
            <h2 style="font-size:1.8rem; font-weight:bold; color:var(--text-main); margin-bottom:10px;">
                ${isPass ? '모의고사 합격 기준 충족!' : '불합격 (커트라인 미달)'}
            </h2>
            <p style="font-size:1.2rem; color:var(--text-sub); margin-bottom:30px;">
                최종 백분율 점수: <strong style="font-size:1.5rem; color:${isPass ? '#2f855a' : '#c53030'}">${scorePct}점</strong> (${mockQuestions.length}문항 중 ${mockScore}개 취득)
            </p>
            <button onclick="location.reload()" style="background:var(--primary); color:white; border:none; padding:12px 28px; border-radius:6px; font-size:1rem; font-weight:bold; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
                답안지 반납 및 초기 화면으로 리로드
            </button>
        </div>
    `;
}

window.addEventListener('resize', () => {
    const mainLayoutStructure = document.getElementById("mainLayoutStructure");
    if (mainLayoutStructure && currentMode !== 'mockexam') {
        mainLayoutStructure.style.gridTemplateColumns = window.innerWidth <= 768 ? '1fr' : '320px 1fr';
    }
});
</script>
</body>
</html>
