<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="전기기사 시험 핵심 개념 학습 플랫폼">
    <meta name="theme-color" content="#ffffff">
    <title>전기기사 스마트 학습 플랫폼</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    
    <script>
      window.MathJax = {
        tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                    <span>전기기사 패스</span>
                </div>
                <div class="header-controls">
                    <button class="icon-btn" id="darkModeToggle" title="다크모드 전환">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="main-container">
        <div class="container">
            <div class="mode-selector-wrapper">
                <div class="mode-selector">
                    <button class="mode-btn active" data-mode="written">
                        <i class="fas fa-book-open"></i> 필기 모드
                    </button>
                    <button class="mode-btn" data-mode="practical">
                        <i class="fas fa-pen-nib"></i> 실기 모드
                    </button>
                </div>
            </div>

            <section class="search-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="무엇을 찾고 계신가요?" autocomplete="off">
                    <button class="clear-btn" id="clearSearch" style="display: none;"><i class="fas fa-times"></i></button>
                </div>
                
                <div class="filter-controls">
                    <select id="frequencyFilter" class="modern-select">
                        <option value="all">⭐ 출제빈도 전체</option>
                        <option value="상">⭐⭐⭐ 빈도 상</option>
                        <option value="중">⭐⭐ 빈도 중</option>
                        <option value="하">⭐ 빈도 하</option>
                    </select>
                    <select id="viewFilter" class="modern-select">
                        <option value="all">👀 보기 방식 전체</option>
                        <option value="favorites">💖 즐겨찾기만</option>
                        <option value="learned">✅ 학습완료만</option>
                        <option value="unlearned">⬜ 미학습만</option>
                    </select>
                </div>
            </section>

            <section class="stats-section">
                <div class="stat-card">
                    <div class="stat-icon light-blue"><i class="fas fa-layer-group"></i></div>
                    <div class="stat-info">
                        <div class="stat-label">등록된 개념</div>
                        <div class="stat-value" id="totalConcepts">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon light-pink"><i class="fas fa-heart"></i></div>
                    <div class="stat-info">
                        <div class="stat-label">즐겨찾기</div>
                        <div class="stat-value" id="favoritesCount">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon light-green"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-info">
                        <div class="stat-label">학습완료</div>
                        <div class="stat-value" id="learnedCount">0</div>
                    </div>
                </div>
            </section>

            <section class="category-tabs" id="categoryTabs"></section>

            <div class="result-info">
                <div id="resultCount" class="result-count"></div>
                <div class="sort-controls">
                    <button class="sort-btn active" data-sort="default">기본순</button>
                    <button class="sort-btn" data-sort="title">가나다순</button>
                    <button class="sort-btn" data-sort="frequency">빈도순</button>
                </div>
            </div>

            <section class="concepts-grid" id="conceptsGrid"></section>

            <div class="no-results" id="noResults" style="display: none;">
                <div class="empty-icon">😵</div>
                <h3>검색 결과가 없어요</h3>
                <p>다른 검색어나 필터를 선택해보세요.</p>
            </div>
        </div>
    </main>

    <div class="modal" id="conceptModal">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-badge-group">
                    <span class="concept-badge" id="modalCategory"></span>
                    <span class="concept-frequency" id="modalFrequency"></span>
                </div>
                <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <h2 id="modalTitle" class="modal-title-text"></h2>
                
                <div class="concept-section definition-box">
                    <p id="modalDefinition"></p>
                </div>
                
                <div class="concept-section" id="modalFormulaSection">
                    <h3 class="section-title">핵심 내용 / 공식</h3>
                    <div class="formula-box" id="modalFormula"></div>
                </div>
                
                <div class="concept-section" id="modalRelatedSection">
                    <h3 class="section-title">연관 키워드</h3>
                    <div class="related-tags" id="modalRelated"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-favorite" id="modalFavoriteBtn">
                    <i class="far fa-heart"></i><span>즐겨찾기</span>
                </button>
                <button class="btn btn-learned" id="modalLearnedBtn">
                    <i class="far fa-check-circle"></i><span>학습완료</span>
                </button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
