<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교류 파형 분석 실험실</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        * { margin: 0; padding: 0; box-sizing: border-box !important; font-family: 'Pretendard', sans-serif; }
        
        body { background-color: #0b0f19; color: #f1f5f9; padding: 12px; overflow: hidden; }

        /* 70:30 비율의 미니멀 샌드박스 키트 레이아웃 */
        .lab-kit {
            background: #141b2d; border: 1px solid #1f293d; border-radius: 20px; padding: 16px;
            width: 100%; max-width: 1180px; margin: 0 auto; display: grid;
            grid-template-columns: minmax(340px, 1fr) 280px; gap: 16px; align-items: stretch;
            box-shadow: 0 12px 24px rgba(0,0,0,0.35);
        }

        @media (max-width: 768px) {
            body { overflow-y: auto; }
            .lab-kit { grid-template-columns: 1fr; }
        }

        /* 왼쪽 시각화 실험 무대 (70% 비중) */
        .visual-stage {
            display: flex; flex-direction: column; gap: 12px; width: 100%; min-width: 0;
        }

        /* 전류 왕복 진동 회로 패널 */
        .circuit-panel {
            background: #040710; border: 2px dashed #1f293d; border-radius: 12px; 
            height: 130px; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center;
        }
        .wire-line { position: absolute; width: 75%; height: 4px; background: #1e293b; z-index: 1; }
        
        .ac-generator { position: absolute; left: 12.5%; top: 50%; transform: translate(-50%, -50%); background: #3b82f6; padding: 10px; border-radius: 50%; font-size: 1.1rem; font-weight: 800; z-index: 5; border: 2px solid #1d4ed8; box-shadow: 0 0 12px rgba(59, 130, 246, 0.4); }
        .component-bulb { position: absolute; right: 12.5%; top: 50%; transform: translate(50%, -50%); width: 54px; height: 54px; background: #1f293d; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.4rem; z-index: 5; border: 2px solid #334155; will-change: background, box-shadow, transform; transition: transform 0.05s ease; }

        /* 🏃 왕복 진동 전하 파티클 (Ohm.html 폭주 엔진 계승) */
        .electron {
            position: absolute; width: 12px; height: 6px; background: #f59e0b; border-radius: 50%;
            box-shadow: 0 0 12px 2px #f59e0b; z-index: 4; top: -1px; left: 0;
            animation: acOscillate linear infinite;
            animation-duration: var(--ac-period, 1s);
            will-change: transform;
        }

        /* 교류(AC) 특유의 제자리 왕복 운동을 구현하는 하드웨어 가속 키프레임 */
        @keyframes acOscillate {
            0%   { transform: translateX(0); }
            25%  { transform: translateX(var(--track-width, 300px)); }
            50%  { transform: translateX(0); }
            75%  { transform: translateX(calc(var(--track-width, 300px) * -1)); }
            100% { transform: translateX(0); }
        }

        /* 📈 실시간 사인/코사인 그래프 오실로스코프 패널 */
        .chart-panel {
            background: #040710; border: 1px solid #1f293d; border-radius: 12px;
            height: 200px; position: relative; width: 100%;
        }
        canvas { width: 100%; height: 100%; display: block; }

        /* 오른쪽 제어판 (30% 비중) */
        .control-section {
            display: flex; flex-direction: column; justify-content: space-between;
            background: #1f293d; border-radius: 14px; padding: 16px; border: 1px solid #334155;
        }
        .panel-header { font-size: 1rem; font-weight: 700; color: #818cf8; border-bottom: 1px solid #1f293d; padding-bottom: 8px; }

        .mini-display { background: #090d16; border: 1px solid #1f293d; border-radius: 10px; padding: 12px; display: flex; flex-direction: column; gap: 8px; margin: 4px 0; }
        .data-row { display: flex; justify-content: space-between; font-size: 0.84rem; color: #94a3b8; align-items: center; }
        .data-row strong { font-size: 1.15rem; color: #f8fafc; }
        .wave-color-sin { color: #3b82f6 !important; }
        .wave-color-cos { color: #10b981 !important; }

        .slider-wrapper { display: flex; flex-direction: column; gap: 14px; }
        .slider-group { display: flex; flex-direction: column; gap: 4px; }
        .slider-meta { display: flex; justify-content: space-between; font-size: 0.82rem; font-weight: 600; }
        
        input[type="range"] { width: 100%; height: 6px; border-radius: 3px; background: #374151; outline: none; -webkit-appearance: none; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #6366f1; transition: transform 0.1s; }
        input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.2); }
        
        .back-btn { background: #374151; color: #d1d5db; border: none; padding: 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; margin-top: 10px; transition: background 0.2s; }
        .back-btn:hover { background: #4b5563; color: white; }
    </style>
</head>
<body>

<div class="lab-kit">
    <div class="visual-stage">
        <div class="circuit-panel" id="circuitStage">
            <div class="wire-line" id="wireTrack"></div>
            <div class="ac-generator">∼</div>
            <div class="component-bulb" id="bulb">💡</div>
        </div>
        <div class="chart-panel">
            <canvas id="scopeCanvas"></canvas>
        </div>
    </div>

    <div class="control-section">
        <div>
            <div class="panel-header">📈 교류 파형 분석 모듈</div>
            <p style="font-size: 0.75rem; color: #64748b; margin-top: 5px;">전압 파형의 위상차와 주파수를 제어합니다.</p>
        </div>
        
        <div class="mini-display">
            <div class="data-row"><span>순시 전압 v(t)</span><span><strong id="sinText" class="wave-color-sin">0.00</strong> V</span></div>
            <div class="data-row"><span>위상차 전압 v_phase(t)</span><span><strong id="cosText" class="wave-color-cos">0.00</strong> V</span></div>
            <div class="data-row" style="border-top:1px dashed #1f293d; padding-top:6px; margin-top:2px;">
                <span>현재 실효값 (Vrms)</span><span><strong id="rmsText">0.00</strong> V</span>
            </div>
        </div>

        <div class="slider-wrapper">
            <div class="slider-group">
                <div class="slider-meta"><span style="color:#f43f5e;">⚡ 최댓값 (Vm)</span><span id="vIndicator">100.0 V</span></div>
                <input type="range" id="vRange" min="10" max="150" step="5" value="100">
            </div>
            <div class="slider-group">
                <div class="slider-meta"><span style="color:#3b82f6;">🔄 주파수 (Hz)</span><span id="fIndicator">1.0 Hz</span></div>
                <input type="range" id="fRange" min="0.2" max="5.0" step="0.1" value="1">
            </div>
            <div class="slider-group">
                <div class="slider-meta"><span style="color:#10b981;">📐 위상차 (Phase θ)</span><span id="pIndicator">90°</span></div>
                <input type="range" id="pRange" min="0" max="180" step="15" value="90">
            </div>
        </div>

        <button class="back-btn" onclick="location.href='./list.html'">◀ 실험실 메뉴판 복귀</button>
    </div>
</div>

<script>
    const vRange = document.getElementById('vRange');
    const fRange = document.getElementById('fRange');
    const pRange = document.getElementById('pRange');
    const sinText = document.getElementById('sinText');
    const cosText = document.getElementById('cosText');
    const rmsText = document.getElementById('rmsText');
    const vIndicator = document.getElementById('vIndicator');
    const fIndicator = document.getElementById('fIndicator');
    const pIndicator = document.getElementById('pIndicator');
    const bulb = document.getElementById('bulb');
    const wireTrack = document.getElementById('wireTrack');
    const circuitStage = document.getElementById('circuitStage');
    
    const canvas = document.getElementById('scopeCanvas');
    const ctx = canvas.getContext('2d');
    
    let timeTicker = 0; // 타임 오프셋 디렉터

    function resizeCanvas() {
        canvas.width = canvas.parentElement.offsetWidth;
        canvas.height = canvas.parentElement.offsetHeight;
    }

    function renderACEngine() {
        const Vm = parseFloat(vRange.value);
        const freq = parseFloat(fRange.value);
        const phaseDeg = parseFloat(pRange.value);
        const phaseRad = (phaseDeg * Math.PI) / 180;

        // 기능사 기출: 실효값 = 최댓값 / 루트2
        const Vrms = Vm / Math.sqrt(2);

        vIndicator.innerText = Vm.toFixed(1) + ' V';
        fIndicator.innerText = freq.toFixed(1) + ' Hz';
        pIndicator.innerText = phaseDeg + '°';
        rmsText.innerText = Vrms.toFixed(1) + ' V';

        // 1. 🏃 전류 왕복 진동폭 및 속도 가속화 공식
        const trackWidth = wireTrack.offsetWidth;
        const halfAmplitude = (trackWidth * 0.38); 
        circuitStage.style.setProperty('--track-width', `${halfAmplitude}px`);
        
        // 주파수가 높아질수록 왕복 주기(Period) 단축 처리
        const period = 1 / freq;
        circuitStage.style.setProperty('--ac-period', `${period}s`);

        // 2. 📈 실시간 오실로스코프 그래프 연산
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const centerY = canvas.height / 2;
        const width = canvas.width;
        
        // 제로 그리드 기준선
        ctx.strokeStyle = '#1f293d';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, centerY); ctx.lineTo(width, centerY); ctx.stroke();

        // 시간에 따른 각도 변화 추종
        timeTicker += 0.015 * freq; 
        const currentAngle = 2 * Math.PI * timeTicker;

        // 현재 시점의 실시간 순시 전압값 도출
        const instSin = Vm * Math.sin(currentAngle);
        const instCos = Vm * Math.sin(currentAngle + phaseRad);

        sinText.innerText = instSin.toFixed(2);
        cosText.innerText = instCos.toFixed(2);

        // 💡 실시간 전압 크기(절댓값)에 반응하는 전구 깜빡임(플리커) 이펙트
        const currentPower = Math.abs(instSin) / Vm;
        const bulbScale = 0.95 + (currentPower * 0.18);
        const glow = currentPower * 70;
        
        if(currentPower > 0.03) {
            bulb.style.background = `rgba(245, 158, 11, ${0.1 + currentPower * 0.9})`;
            bulb.style.transform = `translate(50%, -50%) scale(${bulbScale})`;
            bulb.style.boxShadow = `0 0 ${glow}px ${glow/3.5}px rgba(245, 158, 11, 0.85)`;
        } else {
            bulb.style.background = '#1f293d';
            bulb.style.transform = `translate(50%, -50%) scale(1)`;
            bulb.style.boxShadow = 'none';
        }

        // 기준 사인파선 드로잉 (파란색)
        ctx.lineWidth = 2.5;
        ctx.strokeStyle = '#3b82f6';
        ctx.beginPath();
        for (let x = 0; x < width; x++) {
            const angle = (x / width) * 2 * Math.PI * 2 + currentAngle;
            const y = centerY - (Math.sin(angle) * (centerY * 0.65) * (Vm / 150));
            if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();

        // 위상차가 적용된 정현파선 드로잉 (초록색)
        ctx.strokeStyle = '#10b981';
        ctx.beginPath();
        for (let x = 0; x < width; x++) {
            const angle = (x / width) * 2 * Math.PI * 2 + currentAngle + phaseRad;
            const y = centerY - (Math.sin(angle) * (centerY * 0.65) * (Vm / 150));
            if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();

        // 수직 계측선 타겟 점선 매핑
        ctx.strokeStyle = 'rgba(244, 63, 94, 0.4)';
        ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(width * 0.2, 0); ctx.lineTo(width * 0.2, canvas.height); ctx.stroke();
        ctx.setLineDash([]);

        requestAnimationFrame(renderACEngine);
    }

    // 🏃 고속 왕복 전하 입자 배치 인프라 (안전선 한도 내 촘촘하게 공급)
    function spawnAcElectrons() {
        document.querySelectorAll('.electron').forEach(el => el.remove());
        const totalParticles = 35; // 촘촘한 띠 형태를 위해 입자 대폭 증량
        for(let k = 0; k < totalParticles; k++) {
            const dot = document.createElement('div');
            dot.className = 'electron';
            // 고정 사이클 분산 딜레이 주입으로 충돌 분산
            dot.style.animationDelay = `-${k * (1 / totalParticles)}s`;
            wireTrack.appendChild(dot);
        }
    }

    window.addEventListener('resize', () => {
        resizeCanvas();
        spawnAcElectrons();
    });

    window.addEventListener('load', () => {
        resizeCanvas();
        spawnAcElectrons();
        requestAnimationFrame(renderACEngine);
    });
</script>
</body>
</html>
