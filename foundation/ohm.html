<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>옴의 법칙 인터랙티브 실험 키트</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box !important;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f1f5f9;
            padding: 12px;
            overflow: hidden;
        }

        .lab-kit {
            background: #141b2d;
            border: 1px solid #1f293d;
            border-radius: 20px;
            padding: 16px;
            width: 100%;
            max-width: 1180px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: minmax(340px, 1fr) 260px;
            gap: 16px;
            align-items: stretch;
            box-shadow: 0 12px 24px rgba(0,0,0,0.35);
        }

        @media (max-width: 560px) {
            body {
                overflow-y: auto;
            }

            .lab-kit {
                grid-template-columns: 1fr;
            }
        }

        .circuit-section {
            background: #090d16;
            border: 2px dashed #1f293d;
            border-radius: 16px;
            height: 310px;
            min-width: 0;
            position: relative;
            overflow: hidden;
        }

        .circuit-loop {
            position: absolute;
            left: 15%;
            top: 22%;
            width: 70%;
            height: 56%;
            border: 4px solid #1e293b;
            border-radius: 20px;
            z-index: 1;
        }

        .component-battery {
            position: absolute;
            left: 15%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: #10b981;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 1.5rem;
            font-weight: 800;
            z-index: 3;
            border: 2px solid #047857;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.35);
        }

        .component-battery::before {
            content: '+';
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            color: #10b981;
            font-weight: bold;
        }

        .component-resistor {
            position: absolute;
            bottom: 22%;
            left: 50%;
            transform: translate(-50%, 50%);
            background: #64748b;
            color: #fff;
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 700;
            z-index: 3;
            border: 2px dashed #475569;
            transition: background 0.2s ease;
        }

        .component-bulb {
            position: absolute;
            right: 15%;
            top: 50%;
            transform: translate(50%, -50%) scale(1);
            width: 62px;
            height: 62px;
            background: #1e293b;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.75rem;
            z-index: 3;
            border: 2px solid #334155;
            transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
        }

        .current-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #f59e0b;
            border-radius: 50%;
            box-shadow: 0 0 8px #f59e0b;
            z-index: 4;
            animation: circuitFlow linear infinite;
            animation-duration: var(--flow-speed, 2.8s);
            transform: translate(-50%, -50%);
            will-change: left, top;
            pointer-events: none;
        }

        @keyframes circuitFlow {
            0%   { left: 0%;   top: 100%; opacity: 0; }
            5%   { opacity: 1; }
            25%  { left: 0%;   top: 0%; }
            50%  { left: 100%; top: 0%; }
            75%  { left: 100%; top: 100%; }
            95%  { opacity: 1; }
            100% { left: 0%;   top: 100%; opacity: 0; }
        }

        .control-section {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 12px;
            min-width: 0;
        }

        .panel-header {
            font-size: 1rem;
            font-weight: 700;
            color: #818cf8;
            border-bottom: 1px solid #1f293d;
            padding-bottom: 8px;
        }

        .panel-sub {
            font-size: 0.78rem;
            color: #64748b;
            margin-top: 5px;
        }

        .mini-display {
            background: #090d16;
            border: 1px solid #1f293d;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            font-size: 0.86rem;
            color: #94a3b8;
        }

        .data-row strong {
            font-size: 1.12rem;
            color: #f8fafc;
            white-space: nowrap;
        }

        .data-row .highlight-i {
            color: #f43f5e;
            font-size: 1.22rem;
        }

        .slider-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .slider-meta {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            font-size: 0.84rem;
            font-weight: 600;
        }

        .slider-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #1f293d;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #4f46e5;
            transition: transform 0.1s;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }
    </style>
</head>
<body>

<div class="lab-kit">
    <div class="circuit-section" id="stage">
        <div class="circuit-loop" id="circuitLoop"></div>
        <div class="component-battery" id="battery">🔋</div>
        <div class="component-resistor" id="resistor">🚧 저항</div>
        <div class="component-bulb" id="bulb">💡</div>
    </div>

    <div class="control-section">
        <div>
            <div class="panel-header">📐 Ohm's Law 실험 제어판</div>
            <p class="panel-sub">전압과 저항을 바꾸며 전류 변화를 확인하세요.</p>
        </div>

        <div class="mini-display">
            <div class="data-row">
                <span>전압 V</span>
                <span><strong id="vText">5.0</strong> V</span>
            </div>
            <div class="data-row">
                <span>저항 R</span>
                <span><strong id="rText">10</strong> Ω</span>
            </div>
            <div class="data-row" style="border-top: 1px dashed #1f293d; padding-top: 8px; margin-top: 4px;">
                <span>전류 I = V ÷ R</span>
                <span><strong id="iText" class="highlight-i">0.50</strong> A</span>
            </div>
        </div>

        <div class="slider-wrapper">
            <div class="slider-group">
                <div class="slider-meta">
                    <span style="color:#10b981;">🔋 전압 조절</span>
                    <span style="color:#10b981;" id="vVal">5.0 V</span>
                </div>
                <input type="range" id="vRange" min="1" max="12" step="0.5" value="5">
            </div>

            <div class="slider-group">
                <div class="slider-meta">
                    <span style="color:#94a3b8;">🚧 저항 조절</span>
                    <span style="color:#94a3b8;" id="rVal">10 Ω</span>
                </div>
                <input type="range" id="rRange" min="2" max="50" step="1" value="10">
            </div>
        </div>
    </div>
</div>

<script>
    const vRange = document.getElementById('vRange');
    const rRange = document.getElementById('rRange');
    const vText = document.getElementById('vText');
    const rText = document.getElementById('rText');
    const iText = document.getElementById('iText');
    const vVal = document.getElementById('vVal');
    const rVal = document.getElementById('rVal');
    const bulb = document.getElementById('bulb');
    const resistor = document.getElementById('resistor');
    const stage = document.getElementById('stage');
    const circuitLoop = document.getElementById('circuitLoop');

    function processCircuitDynamics() {
        const v = parseFloat(vRange.value);
        const r = Math.max(2, parseFloat(rRange.value));
        const i = v / r;

        vText.innerText = v.toFixed(1);
        vVal.innerText = v.toFixed(1) + ' V';
        rText.innerText = r;
        rVal.innerText = r + ' Ω';
        iText.innerText = i.toFixed(2);

        resistor.innerText = `🚧 ${r}Ω 저항`;

        const visualCurrent = Math.min(i, 2.5);
        const bulbScale = 1 + (visualCurrent * 0.08);
        const glowRadius = 10 + (visualCurrent * 14);
        const alpha = Math.min(0.25 + (visualCurrent * 0.25), 0.85);

        bulb.style.background = `rgba(245, 158, 11, ${alpha})`;
        bulb.style.transform = `translate(50%, -50%) scale(${bulbScale})`;
        bulb.style.boxShadow = `0 0 ${glowRadius}px rgba(245, 158, 11, ${alpha})`;

        const resistorColorIntensity = Math.max(40, 120 - (r * 2));
        resistor.style.background = `rgb(${resistorColorIntensity}, ${resistorColorIntensity + 15}, ${resistorColorIntensity + 30})`;

        const speedDuration = Math.max(1.2, 4.2 - (visualCurrent * 0.8));
        stage.style.setProperty('--flow-speed', `${speedDuration}s`);

        const maxDots = Math.max(2, Math.min(Math.ceil(i * 3), 5));

        circuitLoop.querySelectorAll('.current-particle').forEach(el => el.remove());

        for (let k = 0; k < maxDots; k++) {
            const dot = document.createElement('div');
            dot.className = 'current-particle';
            dot.style.animationDelay = `${k * (speedDuration / maxDots)}s`;
            circuitLoop.appendChild(dot);
        }
    }

    function resetScrollPosition() {
        window.scrollTo(0, 0);

        try {
            if (window.parent && window.parent !== window) {
                window.parent.scrollTo(0, 0);
            }
        } catch (error) {}
    }

    vRange.addEventListener('input', processCircuitDynamics);
    rRange.addEventListener('input', processCircuitDynamics);

    window.addEventListener('load', () => {
        resetScrollPosition();
        processCircuitDynamics();
    });

    window.addEventListener('resize', processCircuitDynamics);
</script>
</body>
</html>
