<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직렬 & 병렬 통합 실험 키트</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        * { margin: 0; padding: 0; box-sizing: border-box !important; font-family: 'Pretendard', sans-serif; }
        
        body { background-color: #0b0f19; color: #f1f5f9; padding: 12px; overflow: hidden; }

        .lab-kit {
            background: #141b2d; border: 1px solid #1f293d; border-radius: 20px; padding: 16px;
            width: 100%; max-width: 1180px; margin: 0 auto; display: grid;
            grid-template-columns: minmax(340px, 1fr) 280px; gap: 16px; align-items: stretch;
            box-shadow: 0 12px 24px rgba(0,0,0,0.35);
        }

        @media (max-width: 768px) {
            body { overflow-y: auto; }
            .lab-kit { grid-template-columns: 1fr; }
        }

        /* 회로 렌더링 뷰포트 */
        .circuit-section {
            background: #090d16; border: 2px dashed #1f293d; border-radius: 16px; 
            height: 340px; min-width: 0; position: relative; overflow: hidden;
        }

        /* 🔋 배터리 (공통) */
        .component-battery {
            position: absolute; left: 12%; top: 50%; transform: translate(-50%, -50%);
            background: #10b981; padding: 10px 14px; border-radius: 6px; font-size: 1.5rem; 
            font-weight: 800; z-index: 5; border: 2px solid #047857; box-shadow: 0 0 12px rgba(16, 185, 129, 0.35);
        }
        .component-battery::before { content: '+'; position: absolute; top: -22px; left: 50%; transform: translateX(-50%); color: #10b981; font-weight: bold; }

        /* =========================================
           [직렬 모드 전용 UI]
           ========================================= */
        #seriesView { display: block; width: 100%; height: 100%; position: absolute; top:0; left:0; }
        .series-loop { position: absolute; left: 12%; top: 20%; width: 75%; height: 60%; border: 4px solid #1e293b; border-radius: 20px; z-index: 1; }
        
        .series-bulb-1 { position: absolute; left: 50%; top: 20%; transform: translate(-50%, -50%) scale(1); width: 56px; height: 56px; background: #1e293b; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; z-index: 3; border: 2px solid #334155; transition: all 0.15s ease; }
        .series-bulb-2 { position: absolute; left: 50%; bottom: 20%; transform: translate(-50%, 50%) scale(1); width: 56px; height: 56px; background: #1e293b; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; z-index: 3; border: 2px solid #334155; transition: all 0.15s ease; }

        /* =========================================
           [병렬 모드 전용 UI]
           ========================================= */
        #parallelView { display: none; width: 100%; height: 100%; position: absolute; top:0; left:0; }
        .parallel-loop-inner { position: absolute; left: 12%; top: 28%; width: 45%; height: 44%; border: 4px solid #1e293b; border-radius: 12px; z-index: 1; }
        .parallel-loop-outer { position: absolute; left: 12%; top: 12%; width: 75%; height: 76%; border: 4px solid #1e293b; border-radius: 16px; z-index: 0; border-left: none; }
        
        .parallel-bulb-1 { position: absolute; right: 0%; top: 50%; transform: translate(50%, -50%) scale(1); width: 50px; height: 50px; background: #1e293b; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.3rem; z-index: 3; border: 2px solid #334155; transition: all 0.15s ease; }
        .parallel-bulb-2 { position: absolute; right: 0%; top: 50%; transform: translate(50%, -50%) scale(1); width: 50px; height: 50px; background: #1e293b; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.3rem; z-index: 3; border: 2px solid #334155; transition: all 0.15s ease; }

        /* 🏃 레이저 파티클 애니메이션 엔진 */
        .current-particle {
            position: absolute; width: 12px; height: 6px; border-radius: 10px; z-index: 4;
            transform: translate(-50%, -50%); will-change: left, top; pointer-events: none;
        }

        .dot-series { background: #f59e0b; box-shadow: 0 0 12px 3px #f59e0b; animation: flowRect linear infinite; }
        .dot-p-inner { background: #3b82f6; box-shadow: 0 0 12px 3px #3b82f6; animation: flowRect linear infinite; }
        .dot-p-outer { background: #f43f5e; box-shadow: 0 0 12px 3px #f43f5e; animation: flowRect linear infinite; }

        /* 단일 공용 키프레임 (부모 루프 박스의 비율을 따라 회전) */
        @keyframes flowRect {
            0%   { left: 0%;   top: 100%; opacity: 0; }
            5%   { opacity: 1; }
            25%  { left: 0%;   top: 0%; }
            50%  { left: 100%; top: 0%; }
            75%  { left: 100%; top: 100%; }
            95%  { opacity: 1; }
            100% { left: 0%;   top: 100%; opacity: 0; }
        }

        /* 🚨 컨트롤 패널 UI */
        .control-section { display: flex; flex-direction: column; justify-content: flex-start; gap: 12px; min-width: 0; }
        
        /* 탭 스위치 버튼 */
        .mode-toggle { display: flex; background: #1f293d; border-radius: 8px; padding: 4px; gap: 4px; }
        .mode-btn { flex: 1; background: transparent; color: #94a3b8; border: none; padding: 10px 0; font-size: 0.95rem; font-weight: 700; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .mode-btn.active { background: #4f46e5; color: white; box-shadow: 0 2px 8px rgba(79, 70, 229, 0.4); }

        .mini-display { background: #090d16; border: 1px solid #1f293d; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .data-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; font-size: 0.85rem; color: #94a3b8; }
        .data-row strong { font-size: 1.15rem; color: #f8fafc; }
        .data-row .highlight { color: #f59e0b; font-size: 1.25rem; }

        .slider-wrapper { display: flex; flex-direction: column; gap: 12px; margin-top: 5px; }
        .slider-group { display: flex; flex-direction: column; gap: 6px; }
        .slider-meta { display: flex; justify-content: space-between; gap: 10px; font-size: 0.84rem; font-weight: 600; }
        input[type="range"] { width: 100%; height: 6px; border-radius: 3px; background: #1f293d; outline: none; -webkit-appearance: none; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #4f46e5; transition: transform 0.1s; }
        input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.2); }
        
        #r1Range::-webkit-slider-thumb { background: #3b82f6; }
        #r2Range::-webkit-slider-thumb { background: #f43f5e; }
    </style>
</head>
<body>

<div class="lab-kit">
    <div class="circuit-section" id="stage">
        <div class="component-battery">🔋</div>
        
        <div id="seriesView">
            <div class="series-loop" id="sLoop"></div>
            <div class="series-bulb-1" id="sBulb1">💡</div>
            <div class="series-bulb-2" id="sBulb2">💡</div>
        </div>

        <div id="parallelView">
            <div class="parallel-loop-inner" id="pLoopInner">
                <div class="parallel-bulb-1" id="pBulb1">💡</div>
            </div>
            <div class="parallel-loop-outer" id="pLoopOuter">
                <div class="parallel-bulb-2" id="pBulb2">💡</div>
            </div>
        </div>
    </div>

    <div class="control-section">
        <div class="mode-toggle">
            <button class="mode-btn active" id="btnSeries" onclick="switchMode('series')">⛓️ 직렬 (Series)</button>
            <button class="mode-btn" id="btnParallel" onclick="switchMode('parallel')">🔀 병렬 (Parallel)</button>
        </div>

        <div class="mini-display">
            <div class="data-row"><span>배터리 전압 (V)</span><span><strong id="vText">12.0</strong> V</span></div>
            <div class="data-row"><span>전체 합성저항 (R)</span><span><strong id="rText">20.0</strong> Ω</span></div>
            <div class="data-row" style="border-top: 1px dashed #1f293d; padding-top: 8px; margin-top: 4px;">
                <span>배터리 총 출력전류</span><span><strong id="iTotalText" class="highlight">0.60</strong> A</span>
            </div>
        </div>

        <div class="slider-wrapper">
            <div class="slider-group">
                <div class="slider-meta"><span style="color:#10b981;">🔋 전압 조절</span><span style="color:#10b981;" id="vVal">12.0 V</span></div>
                <input type="range" id="vRange" min="1" max="24" step="0.5" value="12">
            </div>
            <div class="slider-group">
                <div class="slider-meta"><span style="color:#3b82f6;">💡 전구 1 저항 (R₁)</span><span style="color:#3b82f6;" id="r1Val">10 Ω</span></div>
                <input type="range" id="r1Range" min="1" max="50" step="1" value="10">
            </div>
            <div class="slider-group">
                <div class="slider-meta"><span style="color:#f43f5e;">💡 전구 2 저항 (R₂)</span><span style="color:#f43f5e;" id="r2Val">10 Ω</span></div>
                <input type="range" id="r2Range" min="1" max="50" step="1" value="10">
            </div>
        </div>
    </div>
</div>

<script>
    let currentMode = 'series'; // 기본 상태: 직렬 모드

    const vRange = document.getElementById('vRange');
    const r1Range = document.getElementById('r1Range');
    const r2Range = document.getElementById('r2Range');
    const vText = document.getElementById('vText');
    const rText = document.getElementById('rText');
    const iTotalText = document.getElementById('iTotalText');
    const vVal = document.getElementById('vVal');
    const r1Val = document.getElementById('r1Val');
    const r2Val = document.getElementById('r2Val');

    function switchMode(mode) {
        currentMode = mode;
        
        // 탭 버튼 CSS 변경
        document.getElementById('btnSeries').classList.toggle('active', mode === 'series');
        document.getElementById('btnParallel').classList.toggle('active', mode === 'parallel');
        
        // 회로 뷰포트 변경
        document.getElementById('seriesView').style.display = mode === 'series' ? 'block' : 'none';
        document.getElementById('parallelView').style.display = mode === 'parallel' ? 'block' : 'none';
        
        processDynamics();
    }

    // 전구 발광 및 크기 변형 모듈
    function applyBulbVisuals(bulbEl, current, baseColor) {
        const visualCurrent = Math.min(current, 15);
        const scale = Math.min(1 + (visualCurrent * 0.05), 1.5);
        const glow = Math.min(10 + (visualCurrent * 15), 140);
        const alpha = Math.min(0.1 + (visualCurrent * 0.2), 1);
        
        bulbEl.style.background = `rgba(${baseColor}, ${alpha})`;
        // transform 위치 보존 (CSS에 정의된 클래스 기반 위치 유지하면서 scale만 변경)
        const baseTransform = window.getComputedStyle(bulbEl).transform;
        // matrix 초기화를 피하기 위해 CSS 클래스의 원래 translate 값을 인라인에 덮어쓰기
        if(bulbEl.id === 'sBulb1') bulbEl.style.transform = `translate(-50%, -50%) scale(${scale})`;
        if(bulbEl.id === 'sBulb2') bulbEl.style.transform = `translate(-50%, 50%) scale(${scale})`;
        if(bulbEl.id.startsWith('pBulb')) bulbEl.style.transform = `translate(50%, -50%) scale(${scale})`;
        
        bulbEl.style.boxShadow = `0 0 ${glow}px ${glow/3}px rgba(${baseColor}, ${alpha})`;
        bulbEl.style.borderColor = `rgba(${baseColor}, ${Math.max(0.3, alpha)})`;
    }

    // 파티클(레이저 빔) 사출 엔진
    function spawnParticles(loopEl, current, dotClass) {
        loopEl.querySelectorAll('.current-particle').forEach(el => el.remove());
        
        // 전류 폭주 시 속도 리미트 해제 (최저 0.2초)
        const speed = Math.max(0.2, 4.0 / Math.max(current, 0.3));
        // 전류 폭주 시 입자 수 50개 리미트 해제
        const maxDots = Math.min(Math.floor(current * 4) + 3, 50);

        for (let k = 0; k < maxDots; k++) {
            const dot = document.createElement('div');
            dot.className = `current-particle ${dotClass}`;
            dot.style.animationDuration = `${speed}s`;
            dot.style.animationDelay = `${k * (speed / maxDots)}s`;
            
            // 극단적 폭주 시 꼬리를 늘려 빔(Beam) 형태로 만듦
            if (current > 4) dot.style.width = '24px';
            
            loopEl.appendChild(dot);
        }
    }

    function processDynamics() {
        const v = parseFloat(vRange.value);
        const r1 = parseFloat(r1Range.value);
        const r2 = parseFloat(r2Range.value);

        vText.innerText = v.toFixed(1); vVal.innerText = v.toFixed(1) + ' V';
        r1Val.innerText = r1 + ' Ω'; r2Val.innerText = r2 + ' Ω';

        if (currentMode === 'series') {
            // 직렬: 저항이 더해짐, 전류는 같음
            const rTotal = r1 + r2;
            const i = v / rTotal;
            
            rText.innerText = rTotal.toFixed(1);
            iTotalText.innerText = i.toFixed(2);
            iTotalText.style.color = '#f59e0b'; // 직렬 컬러(주황)

            applyBulbVisuals(document.getElementById('sBulb1'), i, '245, 158, 11'); // 주황색 발광
            applyBulbVisuals(document.getElementById('sBulb2'), i, '245, 158, 11');
            spawnParticles(document.getElementById('sLoop'), i, 'dot-series');
            
        } else {
            // 병렬: 각각 독립된 전류, 합성저항 감소
            const i1 = v / r1;
            const i2 = v / r2;
            const iTotal = i1 + i2;
            const rTotal = (r1 * r2) / (r1 + r2);

            rText.innerText = rTotal.toFixed(1);
            iTotalText.innerText = iTotal.toFixed(2);
            iTotalText.style.color = '#10b981'; // 병렬 총합 컬러(초록)

            // 트랙 1 (파란색)
            applyBulbVisuals(document.getElementById('pBulb1'), i1, '59, 130, 246');
            spawnParticles(document.getElementById('pLoopInner'), i1, 'dot-p-inner');
            
            // 트랙 2 (빨간색) - 경로가 더 길어서 시각적 속도감을 동일하게 맞추기 위해 내부 보정
            applyBulbVisuals(document.getElementById('pBulb2'), i2, '244, 63, 94');
            spawnParticles(document.getElementById('pLoopOuter'), i2 * 0.8, 'dot-p-outer');
        }
    }

    [vRange, r1Range, r2Range].forEach(el => el.addEventListener('input', processDynamics));
    window.addEventListener('load', processDynamics);
</script>
</body>
</html>
