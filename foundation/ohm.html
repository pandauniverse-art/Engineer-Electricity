<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직렬 회로 실험 키트</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        * { margin: 0; padding: 0; box-sizing: border-box !important; font-family: 'Pretendard', sans-serif; }
        body { background-color: #0b0f19; color: #f1f5f9; padding: 12px; overflow: hidden; }

        .lab-kit {
            background: #141b2d; border: 1px solid #1f293d; border-radius: 20px; padding: 16px;
            width: 100%; max-width: 1180px; margin: 0 auto; display: grid;
            grid-template-columns: minmax(340px, 1fr) 260px; gap: 16px; align-items: stretch;
            box-shadow: 0 12px 24px rgba(0,0,0,0.35);
        }

        @media (max-width: 560px) {
            body { overflow-y: auto; }
            .lab-kit { grid-template-columns: 1fr; }
        }

        .circuit-section { background: #090d16; border: 2px dashed #1f293d; border-radius: 16px; height: 310px; min-width: 0; position: relative; overflow: hidden; }
        .circuit-loop { position: absolute; left: 15%; top: 22%; width: 70%; height: 56%; border: 4px solid #1e293b; border-radius: 20px; z-index: 1; }

        /* 🔋 배터리 */
        .component-battery { position: absolute; left: 15%; top: 50%; transform: translate(-50%, -50%); background: #10b981; padding: 10px 14px; border-radius: 6px; font-size: 1.5rem; font-weight: 800; z-index: 3; border: 2px solid #047857; box-shadow: 0 0 12px rgba(16, 185, 129, 0.35); }
        .component-battery::before { content: '+'; position: absolute; top: -22px; left: 50%; transform: translateX(-50%); color: #10b981; font-weight: bold; }

        /* 💡 전구 1 (위쪽) */
        .bulb-1 { position: absolute; left: 50%; top: 22%; transform: translate(-50%, -50%) scale(1); width: 50px; height: 50px; background: #1e293b; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.4rem; z-index: 3; border: 2px solid #334155; transition: transform 0.1s ease, background 0.1s ease, box-shadow 0.1s ease; }
        
        /* 💡 전구 2 (아래쪽) */
        .bulb-2 { position: absolute; left: 50%; bottom: 22%; transform: translate(-50%, 50%) scale(1); width: 50px; height: 50px; background: #1e293b; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.4rem; z-index: 3; border: 2px solid #334155; transition: transform 0.1s ease, background 0.1s ease, box-shadow 0.1s ease; }

        /* 🏃 전류 파티클 */
        .current-particle {
            position: absolute; width: 12px; height: 6px; background: #f59e0b; border-radius: 50%; box-shadow: 0 0 10px 2px #f59e0b; z-index: 4;
            animation: circuitFlow linear infinite; animation-duration: var(--flow-speed, 2.8s);
            transform: translate(-50%, -50%); will-change: left, top; pointer-events: none;
        }

        @keyframes circuitFlow {
            0%   { left: 0%;   top: 100%; opacity: 0; }
            5%   { opacity: 1; }
            25%  { left: 0%;   top: 0%; }
            50%  { left: 100%; top: 0%; }
            75%  { left: 100%; top: 100%; }
            95%  { opacity: 1; }
            100% { left: 0%;   top: 100%; opacity: 0; }
        }

        /* 컨트롤 영역 */
        .control-section { display: flex; flex-direction: column; justify-content: flex-start; gap: 12px; min-width: 0; }
        .panel-header { font-size: 1rem; font-weight: 700; color: #818cf8; border-bottom: 1px solid #1f293d; padding-bottom: 8px; }
        .mini-display { background: #090d16; border: 1px solid #1f293d; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .data-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; font-size: 0.86rem; color: #94a3b8; }
        .data-row strong { font-size: 1.12rem; color: #f8fafc; white-space: nowrap; }
        .highlight-i { color: #f43f5e; font-size: 1.22rem; }

        .slider-group { display: flex; flex-direction: column; gap: 6px; margin-top: 5px;}
        .slider-meta { display: flex; justify-content: space-between; gap: 10px; font-size: 0.84rem; font-weight: 600; }
        input[type="range"] { width: 100%; height: 6px; border-radius: 3px; background: #1f293d; outline: none; -webkit-appearance: none; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #4f46e5; transition: transform 0.1s; }
        input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.2); }
    </style>
</head>
<body>

<div class="lab-kit">
    <div class="circuit-section" id="stage">
        <div class="circuit-loop" id="circuitLoop"></div>
        <div class="component-battery" id="battery">🔋</div>
        <div class="bulb-1" id="bulb1">💡</div>
        <div class="bulb-2" id="bulb2">💡</div>
    </div>

    <div class="control-section">
        <div>
            <div class="panel-header">⛓️ 직렬 회로 (Series)</div>
            <p style="font-size: 0.75rem; color: #64748b; margin-top: 5px;">전구가 추가될수록 저항이 커져 흐름이 약해집니다.</p>
        </div>

        <div class="mini-display">
            <div class="data-row"><span>입력 전압 (V)</span><span><strong id="vText">12.0</strong> V</span></div>
            <div class="data-row"><span>합성 저항 (R₁+R₂)</span><span><strong id="rText">20</strong> Ω</span></div>
            <div class="data-row" style="border-top: 1px dashed #1f293d; padding-top: 8px; margin-top: 4px;">
                <span>전체 전류 (I)</span><span><strong id="iText" class="highlight-i">0.60</strong> A</span>
            </div>
        </div>

        <div class="slider-group">
            <div class="slider-meta"><span style="color:#10b981;">🔋 전압 조절</span><span style="color:#10b981;" id="vVal">12.0 V</span></div>
            <input type="range" id="vRange" min="1" max="24" step="0.5" value="12">
        </div>
        <div class="slider-group">
            <div class="slider-meta"><span style="color:#94a3b8;">💡 전구 1 저항</span><span style="color:#94a3b8;" id="r1Val">10 Ω</span></div>
            <input type="range" id="r1Range" min="1" max="30" step="1" value="10">
        </div>
        <div class="slider-group">
            <div class="slider-meta"><span style="color:#94a3b8;">💡 전구 2 저항</span><span style="color:#94a3b8;" id="r2Val">10 Ω</span></div>
            <input type="range" id="r2Range" min="1" max="30" step="1" value="10">
        </div>
    </div>
</div>

<script>
    const vRange = document.getElementById('vRange');
    const r1Range = document.getElementById('r1Range');
    const r2Range = document.getElementById('r2Range');
    const vText = document.getElementById('vText');
    const rText = document.getElementById('rText');
    const iText = document.getElementById('iText');
    const vVal = document.getElementById('vVal');
    const r1Val = document.getElementById('r1Val');
    const r2Val = document.getElementById('r2Val');
    const bulb1 = document.getElementById('bulb1');
    const bulb2 = document.getElementById('bulb2');
    const circuitLoop = document.getElementById('circuitLoop');
    const stage = document.getElementById('stage');

    function processSeriesDynamics() {
        const v = parseFloat(vRange.value);
        const r1 = parseFloat(r1Range.value);
        const r2 = parseFloat(r2Range.value);
        
        // 직렬회로 핵심: 합성저항은 더하고, 전류는 전체가 동일하다
        const totalR = r1 + r2;
        const i = v / totalR;

        vText.innerText = v.toFixed(1); vVal.innerText = v.toFixed(1) + ' V';
        rText.innerText = totalR; r1Val.innerText = r1 + ' Ω'; r2Val.innerText = r2 + ' Ω';
        iText.innerText = i.toFixed(2);

        // 직렬은 전류가 같으므로 두 전구의 밝기 베이스는 동일하게 제어됨
        const visualCurrent = Math.min(i, 15);
        const bulbScale = Math.min(1 + (visualCurrent * 0.05), 1.5);
        const glowRadius = Math.min(10 + (visualCurrent * 15), 150);
        const alpha = Math.min(0.1 + (visualCurrent * 0.2), 1);

        const applyBulbStyle = (bulbEl) => {
            bulbEl.style.background = `rgba(245, 158, 11, ${alpha})`;
            if (bulbEl.id === 'bulb1') bulbEl.style.transform = `translate(-50%, -50%) scale(${bulbScale})`;
            if (bulbEl.id === 'bulb2') bulbEl.style.transform = `translate(-50%, 50%) scale(${bulbScale})`;
            bulbEl.style.boxShadow = `0 0 ${glowRadius}px ${glowRadius/2}px rgba(245, 158, 11, ${alpha})`;
        };

        applyBulbStyle(bulb1);
        applyBulbStyle(bulb2);

        // 🚨 직렬회로 흐름 속도 연동
        const speedDuration = Math.max(0.35, 4.5 / Math.max(i, 0.5));
        stage.style.setProperty('--flow-speed', `${speedDuration}s`);

        const maxDots = Math.min(Math.floor(i * 3.5) + 3, 40);
        circuitLoop.querySelectorAll('.current-particle').forEach(el => el.remove());

        for (let k = 0; k < maxDots; k++) {
            const dot = document.createElement('div');
            dot.className = 'current-particle';
            dot.style.animationDelay = `${k * (speedDuration / maxDots)}s`;
            circuitLoop.appendChild(dot);
        }
    }

    [vRange, r1Range, r2Range].forEach(el => el.addEventListener('input', processSeriesDynamics));
    window.addEventListener('load', processSeriesDynamics);
</script>
</body>
</html>
